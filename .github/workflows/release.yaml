name: Release

on:
  push:
    # On Tag / Release by Mask
    tags:
      - "v*"
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  prepare:
    name: Latest Release
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.current_release.outputs.name }}
      version: ${{ steps.current_release.outputs.tag_name }}
      url: ${{ steps.current_release.outputs.html_url }}
    steps:
      - name: 👀 Get Latest Release
        id: current_release
        uses: joutvhu/get-release@v1
        with:
          latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build / PixelClock
    needs:
      - prepare
    uses: ./.github/workflows/build.yaml
    with:
      release-summary: ${{ needs.prepare.outputs.name }}
      release-url: ${{ needs.prepare.outputs.url }}

  release:
    name: Release
    needs:
      - build
    permissions:
      contents: write
      discussions: write
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Download PixelClock Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: PixelClock-*
          path: release-pixel-clock-files
          merge-multiple: true

      - name: 👀 Check PixelClock artifacts
        run: |
          ls -l
        working-directory: release-pixel-clock-files

      - name: 🎭 Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release-pixel-clock-files/*.factory.bin
          discussion_category_name: Announcements

  cleanup:
    name: GitHub Pages / Delete deployment
    runs-on: ubuntu-latest
    permissions: write-all
    needs:
      - build

    steps:
      - name: 🧹 Delete deployment
        uses: strumwolf/delete-deployment-environment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: pixel-clock
          onlyRemoveDeployments: true

  publish:
    name: Publish new firmware and website to GitHub Pages
    runs-on: ubuntu-latest
    needs:
      - cleanup

    environment:
      name: pixel-clock
      url: ${{ steps.deployment.outputs.page_url }}

    # Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
    # However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
    concurrency:
      group: "pages"
      cancel-in-progress: true

    steps:
      - name: ⬇️ Checkout website files
        uses: actions/checkout@v7

      - name: ⬇️ Checkout Changelog
        uses: actions/checkout@v7
        with:
          ref: main
          sparse-checkout: |
            CHANGELOG.md
          sparse-checkout-cone-mode: false
          path: changelog

      - name: 💅 Copy Changelog to Docs
        run: |
          cp -R changelog/* docs/

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: 📦 Install mkDocs
        run: pip install mkdocs-material

      - name: 📦 Install mkDocs Plug-ins
        run: |
          pip install mkdocs-video
          pip install "mkdocs-material[imaging]"

      - name: 📦 Download Icons Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: icons-*
          path: icons-pixel-clock-files
          merge-multiple: true

      - name: 💅 Transform HTML to MkDocs Markdown
        run: |
          INPUT_FILE="icons-pixel-clock-files/pixel_clock.html"
          OUTPUT_FILE="docs/icons.md"

          echo "## Default Icons" > "$OUTPUT_FILE"
          echo "" >> "$OUTPUT_FILE"

          cat <<EOF >> "$OUTPUT_FILE"
          <style>
            .icon-group { margin-bottom: 10px; }
            .icon-header { margin-bottom: 5px; color: inherit; }
            .icon-name { color: var(--md-code-hl-color); font-weight: bold; }
            .pixel-box {
              background: #1a1a1a;
              padding: 15px;
              border-radius: 8px;
              display: flex;
              flex-wrap: wrap;
              gap: 4px;
            }
            .pixel-svg {
              width: 50px;
              height: 50px;
              border: 1px solid #444;
              image-rendering: pixelated;
            }
          </style>
          EOF

          cat "$INPUT_FILE" | tr -d '\n\r' \
            | sed -E 's/Icon:/\nIcon:/g' \
            | grep '^Icon:' \
            | sed -E 's/<[bB]>([^<]+)<\/[bB]>/<span class="icon-name">\1<\/span>/g' \
            | sed -E 's/<\/?(div|body|html|br)[^>]*>//gi' \
            | sed -E 's/<svg/<svg class="pixel-svg"/g' \
            | sed -E 's/(Icon:[^:]+:)(.*)/<div class="icon-group"><div class="icon-header">\1<\/div><div class="pixel-box">\2<\/div><\/div>/' >> "$OUTPUT_FILE"

      - name: 🧹 Delete Icons Artifacts
        uses: geekyeggo/delete-artifact@v6
        with:
          name: icons-*
          failOnError: false

      - name: 💅 Build the docs site
        run: mkdocs build --config-file .mkdocs.yml

      - name: 📦 Download PixelClock Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: PixelClock-*
          path: release-pixel-clock-files
          merge-multiple: true

      - name: 💅 Copy PixelClock artifacts files
        run: |
          mkdir site/pixel-clock
          cp -R release-pixel-clock-files/* site/pixel-clock/

      - name: 👀 Check output
        run: |
          ls -l
        working-directory: site/pixel-clock

      - name: 🎭 Setup Pages
        uses: actions/configure-pages@v6

      - name: 🚀 Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/

      - name: 💅 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: 🧹 Delete Artifacts / Github Pages
        uses: geekyeggo/delete-artifact@v6
        with:
          name: github-pages
          failOnError: false
